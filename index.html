    // ── FAQ ACCORDION ──────────────────────────────
    function initFAQ() {
      document.querySelectorAll('.faq-q').forEach(q => {
        q.addEventListener('click', () => {
          const item = q.parentElement;
          const wasOpen = item.classList.contains('open');
          document.querySelectorAll('.faq-item').forEach(i => i.classList.remove('open'));
          if (!wasOpen) item.classList.add('open');
        });
      });
    }

    // ============================================
    // AUDIO ENGINE — all synthesized, no files
    // ============================================

    let audioCtx     = null;
    let musicPlaying = false;
    let masterGain   = null;
    let ambientNodes = [];

    function initAudio() {
      if (audioCtx) return;
      audioCtx   = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = audioCtx.createGain();
      masterGain.gain.setValueAtTime(0.45, audioCtx.currentTime);
      masterGain.connect(audioCtx.destination);
    }

    function midiHz(note) {
      return 440 * Math.pow(2, (note - 69) / 12);
    }

    function makeNoise(gainVal, start, dur, filterFreq, dest) {
      const bufSize = Math.floor(audioCtx.sampleRate * Math.min(dur + 0.1, 3));
      const buf  = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
      const src    = audioCtx.createBufferSource();
      src.buffer   = buf;
      const filter = audioCtx.createBiquadFilter();
      filter.type  = 'bandpass';
      filter.frequency.value = filterFreq;
      filter.Q.value = 2;
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0, start);
      g.gain.linearRampToValueAtTime(gainVal, start + 0.05);
      g.gain.linearRampToValueAtTime(0, start + dur);
      src.connect(filter);
      filter.connect(g);
      g.connect(dest || masterGain);
      src.start(start);
      src.stop(start + dur + 0.1);
    }

    // ---- AMBIENT MUSIC ----
    function startAmbientMusic() {
      if (!audioCtx) return;
      ambientNodes = [];
      const now = audioCtx.currentTime;

      const musicGain = audioCtx.createGain();
      musicGain.gain.setValueAtTime(0, now);
      musicGain.gain.linearRampToValueAtTime(0.55, now + 3.5);
      musicGain.connect(masterGain);
      ambientNodes.push(musicGain);

      const reverbGain = audioCtx.createGain();
      reverbGain.gain.value = 0.35;
      reverbGain.connect(musicGain);
      ambientNodes.push(reverbGain);

      // Deep drone: C2 + G2 pairs slightly detuned
      [midiHz(36), midiHz(36)*1.005, midiHz(43), midiHz(43)*1.004].forEach((f, i) => {
        const osc = audioCtx.createOscillator();
        const g   = audioCtx.createGain();
        osc.type = i % 2 === 0 ? 'sine' : 'triangle';
        osc.frequency.value = f;
        g.gain.value = 0.11;
        osc.connect(g); g.connect(musicGain);
        osc.start(now); osc.stop(now + 9999);
        ambientNodes.push(osc, g);
      });

      // Chord swell pad: Cmaj7
      [48, 52, 55, 59, 64].forEach((note, i) => {
        const osc  = audioCtx.createOscillator();
        const g    = audioCtx.createGain();
        const lfo  = audioCtx.createOscillator();
        const lfoG = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = midiHz(note);
        lfo.frequency.value = 0.07 + i * 0.012;
        lfoG.gain.value = 0.05;
        g.gain.value = 0.05;
        lfo.connect(lfoG); lfoG.connect(g.gain);
        osc.connect(g); g.connect(reverbGain);
        lfo.start(now); lfo.stop(now + 9999);
        osc.start(now); osc.stop(now + 9999);
        ambientNodes.push(osc, g, lfo, lfoG);
      });

      // Melody loop
      const melody = [60,62,64,67,69,67,64,62,60,64,67,72,67,64,60,62];
      const durs   = [1.6,1.4,1.8,1.2,2.0,1.6,1.4,1.8,1.2,1.6,1.4,2.0,1.6,1.4,1.8,2.4];
      const melGain = audioCtx.createGain();
      melGain.gain.value = 0.065;
      melGain.connect(reverbGain);
      ambientNodes.push(melGain);

      let melT = now + 4;
      const totalDur = durs.reduce((a, b) => a + b, 0);

      function schedMelody() {
        if (!musicPlaying) return;
        melody.forEach((note, i) => {
          const t = melT;
          const d = durs[i] * 0.82;
          const osc = audioCtx.createOscillator();
          const g   = audioCtx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(midiHz(note), t);
          osc.frequency.linearRampToValueAtTime(midiHz(note) * 1.003, t + d * 0.5);
          osc.frequency.linearRampToValueAtTime(midiHz(note), t + d);
          g.gain.setValueAtTime(0, t);
          g.gain.linearRampToValueAtTime(0.85, t + 0.08);
          g.gain.linearRampToValueAtTime(0, t + d);
          osc.connect(g); g.connect(melGain);
          osc.start(t); osc.stop(t + d + 0.1);
          melT += durs[i];
        });
        setTimeout(schedMelody, (totalDur * 1000) - 200);
      }
      schedMelody();

      // Shimmer highs
      function spawnShimmer() {
        if (!musicPlaying) return;
        const shimNotes = [72,74,76,79,81,84,86,88];
        const note = shimNotes[Math.floor(Math.random() * shimNotes.length)];
        const t    = audioCtx.currentTime;
        const osc  = audioCtx.createOscillator();
        const g    = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = midiHz(note);
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.038, t + 0.05);
        g.gain.exponentialRampToValueAtTime(0.001, t + 2.4);
        osc.connect(g); g.connect(reverbGain);
        osc.start(t); osc.stop(t + 2.5);
        setTimeout(spawnShimmer, 900 + Math.random() * 3000);
      }
      setTimeout(spawnShimmer, 2000);
    }

    function stopAmbientMusic() {
      const now = audioCtx ? audioCtx.currentTime : 0;
      ambientNodes.forEach(n => {
        try { if (n.gain && n.gain.linearRampToValueAtTime) n.gain.linearRampToValueAtTime(0, now + 1.5); } catch(e) {}
        try { if (n.stop) n.stop(now + 1.6); } catch(e) {}
      });
      ambientNodes = [];
    }

    // ---- SFX: LASER CHARGE ----
    function sfxLaserCharge(planetKey) {
      if (!audioCtx) return;
      const now  = audioCtx.currentTime;
      const fMap = { about: 280, works: 340, links: 300, faq: 260 };
      const baseF = fMap[planetKey] || 300;
      const osc = audioCtx.createOscillator();
      const g   = audioCtx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(baseF, now);
      osc.frequency.exponentialRampToValueAtTime(baseF * 3.5, now + 0.11);
      g.gain.setValueAtTime(0, now);
      g.gain.linearRampToValueAtTime(0.18, now + 0.02);
      g.gain.linearRampToValueAtTime(0, now + 0.12);
      osc.connect(g); g.connect(masterGain);
      osc.start(now); osc.stop(now + 0.15);
      makeNoise(0.3, now, 0.06, 120, masterGain);
    }

    // ---- SFX: LASER BEAM ----
    function sfxLaserBeam(planetKey) {
      if (!audioCtx) return;
      const now  = audioCtx.currentTime;
      const fMap = { about: 440, works: 520, links: 480, faq: 400 };
      const baseF = fMap[planetKey] || 460;
      const osc  = audioCtx.createOscillator();
      const filt = audioCtx.createBiquadFilter();
      const g    = audioCtx.createGain();
      osc.type = 'square';
      osc.frequency.setValueAtTime(baseF * 2, now);
      osc.frequency.exponentialRampToValueAtTime(baseF * 0.5, now + 0.32);
      filt.type = 'lowpass'; filt.frequency.value = 1800;
      g.gain.setValueAtTime(0.22, now);
      g.gain.linearRampToValueAtTime(0, now + 0.34);
      osc.connect(filt); filt.connect(g); g.connect(masterGain);
      osc.start(now); osc.stop(now + 0.36);
      makeNoise(0.12, now, 0.3, 600, masterGain);
    }

    // ---- SFX: IMPACT ----
    function sfxImpact() {
      if (!audioCtx) return;
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const g   = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(180, now);
      osc.frequency.exponentialRampToValueAtTime(40, now + 0.25);
      g.gain.setValueAtTime(0.55, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.28);
      osc.connect(g); g.connect(masterGain);
      osc.start(now); osc.stop(now + 0.3);
      makeNoise(0.4,  now,        0.18, 800,  masterGain);
      makeNoise(0.2,  now,        0.35, 200,  masterGain);
      makeNoise(0.15, now + 0.04, 0.2,  3000, masterGain);
      const ping = audioCtx.createOscillator();
      const pg   = audioCtx.createGain();
      ping.type = 'sine';
      ping.frequency.setValueAtTime(1200, now + 0.02);
      ping.frequency.exponentialRampToValueAtTime(600, now + 0.18);
      pg.gain.setValueAtTime(0.15, now + 0.02);
      pg.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
      ping.connect(pg); pg.connect(masterGain);
      ping.start(now + 0.02); ping.stop(now + 0.22);
    }

    // ---- SFX: MODAL OPEN ----
    function sfxModalOpen(planetKey) {
      if (!audioCtx) return;
      const now = audioCtx.currentTime;
      const noteMap = {
        about: [64, 67, 72],
        works: [64, 69, 74],
        links: [67, 71, 74],
        faq:   [60, 65, 69],
      };
      const notes = noteMap[planetKey] || noteMap.about;
      notes.forEach((note, i) => {
        const t = now + i * 0.09;
        const osc = audioCtx.createOscillator();
        const g   = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = midiHz(note);
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.14, t + 0.03);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.7);
        osc.connect(g); g.connect(masterGain);
        osc.start(t); osc.stop(t + 0.75);
      });
    }

    // ---- SFX: MODAL CLOSE ----
    function sfxModalClose() {
      if (!audioCtx) return;
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const g   = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(600, now);
      osc.frequency.exponentialRampToValueAtTime(200, now + 0.18);
      g.gain.setValueAtTime(0.1, now);
      g.gain.linearRampToValueAtTime(0, now + 0.2);
      osc.connect(g); g.connect(masterGain);
      osc.start(now); osc.stop(now + 0.22);
    }

    // ---- SFX: HOVER TICK ----
    function sfxHoverTick() {
      if (!audioCtx) return;
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const g   = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = 900 + Math.random() * 200;
      g.gain.setValueAtTime(0.04, now);
      g.gain.linearRampToValueAtTime(0, now + 0.05);
      osc.connect(g); g.connect(masterGain);
      osc.start(now); osc.stop(now + 0.06);
    }

    // ---- BGM — Real Audio File ----
    const bgm    = document.getElementById('bgm');
    const musicBtn = document.getElementById('music-btn');

    // Set volume and default state
    bgm.volume  = 0.45;
    bgm.loop    = true;
    let bgmMuted = false;

    // Auto-play on first user interaction (browser policy requires gesture)
    let bgmStarted = false;
    function tryStartBGM() {
      if (bgmStarted) return;
      bgmStarted = true;
      bgm.play().catch(() => {
        // Auto-play blocked - user must click the button
        bgmStarted = false;
      });
    }

    // Try to start on any interaction
    document.addEventListener('click',     tryStartBGM, { once: true });
    document.addEventListener('mousemove', tryStartBGM, { once: true });
    document.addEventListener('keydown',   tryStartBGM, { once: true });

    // Mute / Unmute button
    musicBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      tryStartBGM();
      bgmMuted = !bgmMuted;
      bgm.muted = bgmMuted;
      if (bgmMuted) {
        musicBtn.classList.add('muted');
        musicBtn.innerHTML = '&#128264;'; // muted speaker
        musicBtn.title = 'Unmute BGM';
      } else {
        musicBtn.classList.remove('muted');
        musicBtn.innerHTML = '&#128266;'; // loud speaker
        musicBtn.title = 'Mute BGM';
      }
    });

    // ---- WIRE SFX TO EVENTS ----

    // Hover tick on planets
    document.querySelectorAll('.planet-wrap').forEach(wrap => {
      wrap.addEventListener('mouseenter', () => {
        initAudio();
        sfxHoverTick();
      });
    });

    // Override fireLaser to add charge + beam SFX
    // (fireLaser is defined in the laser script block above, same page scope)
    const _baseFire = fireLaser;
    fireLaser = function(planetWrap) {
      initAudio();
      const pKey = planetWrap.dataset.planet;
      sfxLaserCharge(pKey);
      setTimeout(() => sfxLaserBeam(pKey), 125);
      _baseFire(planetWrap);
    };

    // Override spawnImpact for impact SFX
    const _baseImpact = spawnImpact;
    spawnImpact = function(x, y, colors) {
      sfxImpact();
      _baseImpact(x, y, colors);
    };

    // Override openModal for chime
    const _baseOpen = openModal;
    openModal = function(planetKey) {
      initAudio();
      sfxModalOpen(planetKey);
      _baseOpen(planetKey);
    };

    // Override closeModal for whoosh
    const _baseClose = closeModal;
    closeModal = function() {
      initAudio();
      sfxModalClose();
      _baseClose();
    };

    // Re-wire close listeners to use overridden closeModal
    modalClose.onclick = () => closeModal();
    backdrop.onclick = e => { if (e.target === backdrop) closeModal(); };

  </script>
